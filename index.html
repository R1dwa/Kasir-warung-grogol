<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b4332" id="themeColorMeta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kasir Pro">
<link rel="manifest" id="pwaManifest">
<title>Kasir Warung Pro</title>
<meta name="app-version" content="9.0.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;}

/* ====== CSS VARS LIGHT/DARK ====== */
:root{
  --g:#1b4332;--gm:#2d6a4f;--gl:#52b788;--gp:#d8f3dc;--gf:#f0faf3;
  --o:#f4a261;--ol:#fff3e0;
  --r:#e63946;--rl:#fde8ea;
  --bg:#f0f4f0;--w:#fff;--gray:#6b7280;--gl2:#f1f5f1;
  --brd:#d1e8d4;--txt:#1a2e1f;--txt2:#374151;
  --h:56px;--card:#fff;--inp:#fff;
  --shadow:0 2px 8px rgba(0,0,0,.08);
  --stok-ok:#16a34a;--stok-low:#d97706;--stok-habis:#dc2626;
}
body.dark{
  --bg:#0f1b14;--w:#1a2e20;--card:#1e3328;--inp:#253d2a;
  --gray:#9ca3af;--gl2:#1e3328;--brd:#2d4a36;
  --txt:#e8f5e9;--txt2:#a7d4ae;--gp:#1a3325;--gf:#162b1e;--ol:#2a2010;--rl:#2d1414;
  --shadow:0 2px 8px rgba(0,0,0,.4);
}
body{background:var(--bg);color:var(--txt);}

/* ====== LOGIN ====== */
#loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,var(--g) 0%,var(--gm) 55%,var(--gl) 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.lcard{background:var(--w);border-radius:22px;padding:28px 24px;width:100%;max-width:340px;box-shadow:0 24px 64px rgba(0,0,0,.3);}
.llogo{text-align:center;margin-bottom:20px;}
.llogo .li{font-size:44px;}
.llogo h1{font-size:20px;font-weight:800;color:var(--g);margin-top:6px;}
.llogo p{font-size:12px;color:var(--gray);margin-top:2px;}
.upills{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.upill{padding:10px;border:2px solid var(--brd);border-radius:12px;cursor:pointer;text-align:center;transition:all .15s;background:var(--w);}
.upill.sel{border-color:var(--gl);background:var(--gp);}
.upill .ui{font-size:22px;width:36px;height:36px;border-radius:50%;object-fit:cover;display:inline-block;}
.upill img.ui{border-radius:50%;}
.upill .un{font-size:12px;font-weight:700;margin-top:3px;color:var(--txt);}
.upill .ur{font-size:10px;color:var(--gray);}
.pinwrap label{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;}
.pinwrap input{width:100%;padding:10px 14px;border:2px solid var(--brd);border-radius:10px;font-size:20px;font-family:'Space Mono',monospace;letter-spacing:8px;outline:none;text-align:center;margin-bottom:10px;background:var(--inp);color:var(--txt);}
.pinwrap input:focus{border-color:var(--gl);}
.btnlogin{width:100%;padding:12px;background:var(--gm);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.lerr{color:var(--r);font-size:12px;text-align:center;margin-top:6px;min-height:16px;}

/* ====== APP SHELL ====== */
#app{display:none;height:100%;flex-direction:column;}
#app.show{display:flex;}

/* ====== TOPBAR ====== */
.topbar{height:var(--h);background:var(--g);color:#fff;display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.3);}
.btn-menu{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:6px;line-height:1;flex-shrink:0;}
.topbar-title{font-size:16px;font-weight:800;flex:1;}
.topbar-title .topNamaSpan{color:var(--o);}
.topbar-jam{font-family:'Space Mono',monospace;font-size:12px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:14px;}
.topbar-omzet{font-size:11px;text-align:right;line-height:1.5;flex-shrink:0;}
.topbar-omzet strong{font-family:'Space Mono',monospace;color:var(--o);font-size:13px;display:block;}

/* ====== SIDEBAR ====== */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;}
.sidebar-overlay.open{display:block;}
.sidebar{position:fixed;left:-260px;top:0;bottom:0;width:240px;background:var(--g);z-index:300;transition:left .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.sidebar.open{left:0;}
.sb-head{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-user{display:flex;align-items:center;gap:10px;}
.sb-ico{font-size:32px;width:44px;height:44px;border-radius:50%;object-fit:cover;display:flex;align-items:center;justify-content:center;}
img.sb-ico{object-fit:cover;}
.sb-info .sbn{font-size:15px;font-weight:800;color:#fff;}
.sb-info .sbr{font-size:11px;color:rgba(255,255,255,.6);}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;color:rgba(255,255,255,.75);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;font-family:inherit;font-size:14px;font-weight:600;text-align:left;}
.sb-item:hover,.sb-item.active{background:rgba(255,255,255,.15);color:#fff;}
.sb-item .si{font-size:18px;width:24px;text-align:center;}
.sb-divider{height:1px;background:rgba(255,255,255,.08);margin:6px 8px;}
.sb-foot{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1);}
.btn-logout{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;color:rgba(255,255,255,.6);cursor:pointer;border:none;background:none;width:100%;font-family:inherit;font-size:14px;font-weight:600;}
.btn-logout:hover{background:rgba(231,57,70,.2);color:#fca5a5;}

/* ====== PAGES ====== */
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg);}
.page.active{display:flex;}

/* ====== KASIR ====== */
.kasir-wrap{display:flex;flex-direction:column;height:100%;position:relative;}
.produk-side{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.hold-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--ol);border-bottom:1.5px solid #fde68a;flex-shrink:0;overflow-x:auto;}
.hold-bar::-webkit-scrollbar{display:none;}
.hold-lbl{font-size:10px;font-weight:700;color:#92400e;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;}
.hslot{padding:4px 10px;border-radius:7px;border:1.5px dashed #fcd34d;font-size:11px;font-weight:700;cursor:pointer;color:#92400e;background:var(--w);transition:all .12s;white-space:nowrap;flex-shrink:0;}
.hslot.ada{background:var(--o);border-color:var(--o);color:#fff;}
.hslot.aktif{border-style:solid;border-color:#92400e;}
.hnew{margin-left:auto;padding:4px 10px;background:var(--gm);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.search-area{padding:8px 10px;background:var(--w);border-bottom:1.5px solid var(--brd);flex-shrink:0;}
.search-main{position:relative;display:flex;gap:6px;align-items:center;}
.search-main input{flex:1;padding:10px 40px 10px 38px;border:2px solid var(--brd);border-radius:10px;font-size:15px;font-family:inherit;outline:none;background:var(--inp);color:var(--txt);transition:border-color .15s;}
.search-main input:focus{border-color:var(--gl);}
.search-main .sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--gray);pointer-events:none;}
.search-main .btn-clr{position:absolute;right:52px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);font-size:18px;cursor:pointer;display:none;line-height:1;padding:2px 4px;}
.search-main input:not(:placeholder-shown) ~ .btn-clr{display:block;}
.btn-scan{padding:10px 13px;background:var(--gm);color:#fff;border:none;border-radius:9px;font-size:14px;cursor:pointer;flex-shrink:0;}
.filter-row{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--gl2);border-bottom:1.5px solid var(--brd);flex-shrink:0;overflow-x:auto;}
.filter-row::-webkit-scrollbar{display:none;}
.kpill{padding:5px 14px;border-radius:16px;border:1.5px solid var(--brd);background:var(--w);font-size:12px;font-weight:700;color:var(--gray);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s;}
.kpill.active{background:var(--gm);border-color:var(--gm);color:#fff;}
.pgrid{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.pgrid::-webkit-scrollbar{width:3px;}
.pgrid::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}

/* Favorit bar */
.fav-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--gf);border-bottom:1.5px solid var(--brd);flex-shrink:0;overflow-x:auto;}
.fav-bar::-webkit-scrollbar{display:none;}
.fav-lbl{font-size:10px;font-weight:700;color:var(--gm);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;}
.fav-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--gp);border:1.5px solid var(--gl);border-radius:20px;font-size:11px;font-weight:700;color:var(--gm);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .1s;}
.fav-chip:active{background:var(--gm);color:#fff;}
.fav-img{width:18px;height:18px;border-radius:50%;object-fit:cover;}

/* Product card */
.pcard{background:var(--card);border:none;border-bottom:1px solid var(--brd);padding:10px 14px;cursor:pointer;transition:background .1s;user-select:none;display:flex;align-items:center;gap:12px;position:relative;}
.pcard:active:not(.habis){background:var(--gp);}
.pcard.habis{opacity:.4;cursor:not-allowed;}
.pcard.fav-item::before{content:'⭐';position:absolute;top:4px;left:4px;font-size:9px;opacity:.6;}
.pcard-ico{width:42px;height:42px;border-radius:10px;background:var(--gp);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;}
.pcard-ico img{width:100%;height:100%;object-fit:cover;}
.pcard.timbang .pcard-ico{background:#f5f3ff;}
.pcard-body{flex:1;min-width:0;}
.pcard .pn{font-size:14px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);}
.pcard .prow2{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.pcard .pkb{font-size:10px;font-weight:700;color:var(--gm);background:var(--gp);padding:2px 6px;border-radius:5px;text-transform:uppercase;flex-shrink:0;}
.pcard .ps{font-size:11px;}
.ps.stok-ok{color:var(--stok-ok);font-weight:600;}
.ps.stok-low{color:var(--stok-low);font-weight:700;}
.ps.stok-habis{color:var(--stok-habis);font-weight:700;}
.pcard-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.pcard .ph{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--gm);}
.pcard .ph.tim{color:#7c3aed;font-size:11px;}
.pcard .ph.grosir{color:var(--o);}
.padd{width:32px;height:32px;border-radius:8px;background:var(--gm);color:#fff;border:none;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .1s;}
.padd:hover{background:var(--g);}
.hbadge{background:var(--r);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;}
.timbang-badge{background:#7c3aed;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;}
.promo-badge{background:var(--r);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;}
.expired-badge{background:#92400e;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;}

/* Prediksi stok */
.prediksi-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;}
.prediksi-merah{background:#fde8ea;color:var(--r);}
.prediksi-kuning{background:#fff3e0;color:#92400e;}

/* FAB Keranjang */
.fab-cart{position:fixed;bottom:20px;right:16px;width:62px;height:62px;background:var(--gm);color:#fff;border:none;border-radius:50%;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(45,106,79,.45);z-index:150;transition:all .2s;}
.fab-cart:active{transform:scale(.95);}
.fab-count{position:absolute;top:-4px;right:-4px;background:var(--r);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg);opacity:0;transform:scale(0);transition:all .2s;}
.fab-count.show{opacity:1;transform:scale(1);}

/* Keranjang bottom sheet */
.k-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;}
.k-overlay.open{display:block;}
.keranjang-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--w);border-radius:18px 18px 0 0;z-index:201;display:flex;flex-direction:column;max-height:88vh;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 32px rgba(0,0,0,.18);}
.keranjang-sheet.open{transform:translateY(0);}
.ksheet-handle{text-align:center;padding:10px 0 2px;flex-shrink:0;cursor:pointer;}
.ksheet-handle::before{content:'';display:inline-block;width:36px;height:4px;background:var(--brd);border-radius:2px;}
.khead{padding:8px 14px 10px;border-bottom:1.5px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.khead-title{font-size:15px;font-weight:800;color:var(--txt);}
.kbadge{background:var(--gm);color:#fff;font-size:11px;font-weight:700;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.khead-close{background:none;border:none;font-size:22px;color:var(--gray);cursor:pointer;padding:2px;}
.kitems{flex:1;overflow-y:auto;padding:6px 12px;}
.kitems::-webkit-scrollbar{width:3px;}
.kitem{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--gl2);}
.kitem-info{flex:1;min-width:0;}
.kitem-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);}
.kitem-harga{font-size:11px;color:var(--gray);cursor:pointer;display:inline-flex;align-items:center;gap:2px;margin-top:1px;}
.qctrl{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.qctrl button{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--brd);background:var(--gl2);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;color:var(--txt);}
.qctrl button:hover{background:var(--gm);color:#fff;border-color:var(--gm);}
.qnum{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;min-width:22px;text-align:center;color:var(--txt);}
.ksub{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--gm);min-width:64px;text-align:right;flex-shrink:0;}
.kempty{text-align:center;padding:30px 12px;color:var(--gray);}
.kempty .ei{font-size:36px;margin-bottom:8px;}
.kempty p{font-size:13px;}
.kfoot{padding:10px 14px;border-top:2px solid var(--brd);flex-shrink:0;background:var(--w);}
.ktotal-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ktotal-row span:first-child{font-size:12px;color:var(--gray);}
.ktotal-row span:last-child{font-family:'Space Mono',monospace;font-size:18px;font-weight:800;color:var(--gm);}
.kbayar-input{width:100%;padding:9px 12px;border:1.5px solid var(--brd);border-radius:9px;font-family:'Space Mono',monospace;font-size:16px;font-weight:700;outline:none;margin-bottom:6px;background:var(--inp);color:var(--txt);}
.nomcepat{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
.nomcepat button{flex:1;min-width:52px;padding:5px 3px;font-size:11px;font-weight:700;border:1.5px solid var(--brd);border-radius:7px;background:var(--gl2);cursor:pointer;font-family:'Space Mono',monospace;color:var(--txt);}
.kembox{background:var(--ol);border:1.5px solid var(--o);border-radius:8px;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.kembox .kl{font-size:11px;font-weight:700;color:#92400e;}
.kembox .kv{font-family:'Space Mono',monospace;font-size:14px;font-weight:800;color:#92400e;}
.kbtn-row{display:flex;gap:6px;}
.btn-hold2{flex:0 0 auto;padding:12px 14px;background:var(--ol);border:1.5px solid var(--o);color:#92400e;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-clear2{flex:0 0 auto;padding:12px 14px;background:var(--rl);border:1.5px solid var(--r);color:var(--r);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-bayar{flex:1;padding:12px;background:var(--gm);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-bayar:disabled{opacity:.4;cursor:not-allowed;}
.diskon-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-top:1px dashed var(--brd);margin-top:2px;}
.diskon-row label{font-size:11px;color:var(--gray);font-weight:600;flex:1;}
.diskon-type{display:flex;gap:4px;}
.diskon-type button{padding:3px 8px;font-size:10px;font-weight:700;border-radius:5px;border:1.5px solid var(--brd);background:var(--gl2);cursor:pointer;color:var(--txt);}
.diskon-type button.active{background:var(--r);border-color:var(--r);color:#fff;}
.diskon-val{width:70px;padding:4px 7px;border:1.5px solid var(--brd);border-radius:6px;font-size:12px;font-family:'Space Mono',monospace;font-weight:700;outline:none;text-align:center;background:var(--inp);color:var(--txt);}
.diskon-info{background:var(--rl);border-radius:7px;padding:5px 10px;display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
.diskon-info span:first-child{color:var(--r);font-weight:700;}
.diskon-info span:last-child{font-family:'Space Mono',monospace;font-weight:700;color:var(--r);}
/* Multi pembayaran */
.metode-row{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.metode-btn{flex:1;min-width:60px;padding:6px 4px;font-size:11px;font-weight:700;border:1.5px solid var(--brd);border-radius:8px;background:var(--gl2);cursor:pointer;text-align:center;color:var(--txt);transition:all .1s;}
.metode-btn.active{background:var(--gm);border-color:var(--gm);color:#fff;}

/* ====== STOK PAGE ====== */
.stok-wrap{display:flex;flex-direction:column;height:100%;}
.stok-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--w);border-bottom:1.5px solid var(--brd);flex-shrink:0;flex-wrap:wrap;}
.stok-toolbar h2{font-size:15px;font-weight:800;flex:1;color:var(--txt);}
.tblwrap{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--g);color:#fff;padding:8px 10px;font-size:11px;font-weight:700;text-align:left;position:sticky;top:0;z-index:5;}
td{padding:8px 10px;border-bottom:1px solid var(--brd);font-size:12px;vertical-align:middle;color:var(--txt);}
tr:hover td{background:var(--gf);}
.pillk{background:var(--gp);color:var(--gm);padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;}
.hmono{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--gm);}
.snok{font-family:'Space Mono',monospace;font-size:13px;font-weight:800;padding:2px 6px;border-radius:5px;}
.snok.sok{background:var(--gp);color:var(--stok-ok);}
.snok.slow{background:#fff3e0;color:var(--stok-low);}
.snok.shabis{background:var(--rl);color:var(--stok-habis);}
.ab2{padding:4px 8px;border-radius:6px;font-size:12px;cursor:pointer;border:1.5px solid var(--brd);background:var(--gl2);color:var(--txt);}
